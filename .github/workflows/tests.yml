name: tests
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install lint dependency
        run: python -m pip install ruff
      - name: Check formatting and lint
        run: |
          ruff format --check .
          ruff check .
      - name: Build importer ZIP
        run: python scripts/build_release.py
      - name: Run unit and package tests
        run: python -m unittest discover -s tests -v
      - name: Compile all Python files
        run: python -m compileall -q sprite_visibility_rules tests scripts
      - name: Test Flatpak installer layout and backup
        run: bash tests/test_flatpak_installer.sh

  qt-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyQt5 smoke-test dependency
        run: python -m pip install "PyQt5>=5.15,<5.16"
      - name: Import and construct the Krita docker offscreen
        env:
          RUN_QT_SMOKE: "1"
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -p "test_ui_smoke.py" -v
