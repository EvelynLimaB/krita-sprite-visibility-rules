name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime verification dependency
        # Ruff remains enforced by the separate tests workflow. Release
        # publication must be gated by package/runtime tests, not formatting.
        run: python -m pip install "PyQt5>=5.15,<5.16"

      - name: Run full release verification
        env:
          QT_QPA_PLATFORM: offscreen
        run: python3 scripts/verify_release.py

      - name: Read version and decide release mode
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python3 -c 'from sprite_visibility_rules.version import __version__; print(__version__)')"
          TAG="v${VERSION}"
          ASSET="dist/sprite_visibility_rules-${VERSION}.zip"
          MODE="create"

          test -s "$ASSET"
          test -s dist/SHA256SUMS
          grep -F "sprite_visibility_rules-${VERSION}.zip" dist/SHA256SUMS >/dev/null

          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              if [[ "$TAG_SHA" == "$GITHUB_SHA" ]]; then
                MODE="refresh"
              else
                echo "Version ${VERSION} already has a release at ${TAG_SHA}; this push does not publish another release."
                MODE="skip"
              fi
            else
              echo "Tag ${TAG} exists at ${TAG_SHA}, but its GitHub Release is missing; rebuilding from the tag and repairing it."
              MODE="repair"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Rebuild exact tagged package for repair
        if: steps.version.outputs.mode == 'repair'
        env:
          QT_QPA_PLATFORM: offscreen
          TAG: ${{ steps.version.outputs.tag }}
          ASSET: ${{ steps.version.outputs.asset }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "$TAG"
          python3 scripts/verify_release.py
          test -s "$ASSET"
          test -s dist/SHA256SUMS

      - name: Create, repair, or refresh release
        if: steps.version.outputs.mode != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ASSET: ${{ steps.version.outputs.asset }}
          MODE: ${{ steps.version.outputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          case "$MODE" in
            refresh)
              gh release upload "$TAG" \
                "$ASSET" \
                dist/SHA256SUMS \
                --repo "$GITHUB_REPOSITORY" \
                --clobber
              ;;
            repair)
              gh release create "$TAG" \
                "$ASSET" \
                dist/SHA256SUMS \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --title "Sprite Visibility Rules ${VERSION}" \
                --notes-file RELEASE_NOTES.md
              ;;
            create)
              gh release create "$TAG" \
                "$ASSET" \
                dist/SHA256SUMS \
                --repo "$GITHUB_REPOSITORY" \
                --target "$GITHUB_SHA" \
                --title "Sprite Visibility Rules ${VERSION}" \
                --notes-file RELEASE_NOTES.md
              ;;
            *)
              echo "Unknown release mode: $MODE" >&2
              exit 1
              ;;
          esac

      - name: Publish workflow artifact
        if: steps.version.outputs.mode != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: sprite-visibility-rules-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.version.outputs.asset }}
            dist/SHA256SUMS
          if-no-files-found: error
